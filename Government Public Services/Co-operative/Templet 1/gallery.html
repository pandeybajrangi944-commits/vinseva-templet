<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | SOUHARDA CREDIT</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="fw-bold fs-3 text-white">SOUHARDA<span style="color: var(--accent-color);">CREDIT</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto text-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link active" href="gallery.html">Gallery</a></li>
                </ul>
                <div class="d-flex justify-content-center">
                    <a href="contact.html" class="btn btn-cta">Join Us</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Banner -->
    <header class="page-banner" style="background-image: url('https://images.unsplash.com/photo-1556742111-a301076d9d18?auto=format&fit=crop&q=80&w=1920');">
        <div class="page-banner-overlay"></div>
        <div class="container page-banner-content">
            <h1 class="display-3 fw-bold mb-3">Our Gallery</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb justify-content-center">
                    <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Gallery</li>
                </ol>
            </nav>
        </div>
    </header>

    <!-- Co-operative Gallery Grid -->
    <section class="section-padding">
        <div class="container text-center">
            <div class="section-header">
                <span class="subtitle">Community & Growth</span>
                <h2 class="title">Our Visual Journey</h2>
            </div>
            <div class="row g-4">
                <div class="col-lg-4 col-md-6 col-12">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1556740758-90de374c12ad?auto=format&fit=crop&q=80&w=600" alt="Modern Banking">
                    </div>
                </div>
                <div class="col-lg-4 col-md-6 col-12">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1577412647305-991150c7d163?auto=format&fit=crop&q=80&w=600" alt="Office Environment">
                    </div>
                </div>
                <div class="col-lg-4 col-md-6 col-12">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1577412647305-991150c7d163?auto=format&fit=crop&q=80&w=600" alt="Customer Support">
                    </div>
                </div>
                <div class="col-lg-4 col-md-6 col-12">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?auto=format&fit=crop&q=80&w=600" alt="Member Meeting">
                    </div>
                </div>
                <div class="col-lg-4 col-md-6 col-12">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1560520653-9e0e4c89eb11?auto=format&fit=crop&q=80&w=600" alt="Financial Planning">
                    </div>
                </div>
                <div class="col-lg-4 col-md-6 col-12">
                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1560520653-9e0e4c89eb11?auto=format&fit=crop&q=80&w=600" alt="Community Support">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <hr class="border-secondary mb-4">
            <div class="row align-items-center text-center text-md-start">
                <div class="col-md-6 mb-3 mb-md-0">
                    <p class="mb-0 text-white-50 small">&copy; 2026 SOUHARDA CREDIT Co-operative. All rights reserved.</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="mb-0 text-white-50 small">Designed with <span style="color: var(--accent-color);">&hearts;</span> by VINSEVA</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Navbar Scroll Script -->
    <script>
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('sticky');
            } else {
                navbar.classList.remove('sticky');
            }
        });
    </script>
</body>
</html>

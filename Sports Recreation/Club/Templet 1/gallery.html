<!DOCTYPE html>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top sticky">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="brand-mark">DISCO</span>
                <span class="brand-sub">Night Club</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                    <div class="gallery-item">
                        <img src="https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?auto=format&fit=crop&q=80&w=600" alt="DJ Set">

                    </div>
                </div>
                <div class="col-lg-4 col-md-6 col-12">
                    <div class="gallery-item">

                </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">
